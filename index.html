<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>System Formatter</title>

<style>
body{
    background:#000;
    color:#00ff00;
    font-family:Consolas, monospace;
    padding:40px;
}
#progress{
    width:100%;
    height:30px;
    border:1px solid #00ff00;
    margin-top:20px;
}
#bar{
    width:0%;
    height:100%;
    background:#00ff00;
}
</style>
</head>

<body>

<h2>Windows System Utility</h2>
<p id="status">Initializing format...</p>

<div id="progress">
    <div id="bar"></div>
</div>

<script>
let percent = 0;

const messages = [
    "Deleting system files...",
    "Formatting drive C:...",
    "Removing user data...",
    "Installing fresh operating system...",
    "Finalizing..."
];

const timer = setInterval(() => {
    percent++;

    document.getElementById("bar").style.width = percent + "%";

    if(percent === 20)
        document.getElementById("status").innerText = messages[1];

    if(percent === 40)
        document.getElementById("status").innerText = messages[2];

    if(percent === 60)
        document.getElementById("status").innerText = messages[3];

    if(percent === 80)
        document.getElementById("status").innerText = messages[4];

    if(percent >= 100){
        clearInterval(timer);

        document.body.innerHTML = `
            <h1 style="color:red">
                😄 GOTCHA!
            </h1>
            <h2>Your computer is perfectly safe.</h2>
            <p>This was only a harmless prank page.</p>
        `;
    }
}, 80);
</script>

</body>
</html>
